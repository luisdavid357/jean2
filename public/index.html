<!doctype html>
<html lang="es" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jean Food</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      width: 100%;
    }

    /* Patrón de fondo sutil */
    .topographic-background::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0f0f0f;
      background-image: url(https://res.cloudinary.com/dngpdbq6u/image/upload/v1775768204/image-removebg-preview_al0lb4.png);
      background-repeat: repeat;
      background-attachment: fixed;
      opacity: 0.08;
      z-index: 1;
      pointer-events: none;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #0f0f0f;
      background-attachment: fixed;
      color: #1a1a1a;
      overflow: hidden;
    }

    #app {
      position: relative;
      z-index: 2;
      height: 100%;
      width: 100%;
      overflow: auto;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.6s ease-out;
    }

    .animate-slide-up {
      animation: slideInUp 0.6s ease-out;
    }

    .stagger-1 {
      animation-delay: 0.1s;
    }

    .stagger-2 {
      animation-delay: 0.2s;
    }

    .stagger-3 {
      animation-delay: 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #E63946 0%, #d41f3d 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(230, 57, 70, 0.5);
    }

    .btn-secondary {
      background: #f7f7f7;
      color: #1a1a1a;
      border: 2px solid #e5e5e5;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-secondary:hover {
      background: #efefef;
      transform: translateY(-2px);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
      overflow-y: auto;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 90%;
      max-width: 600px;
      max-height: 90%;
      overflow-y: auto;
      animation: slideInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
      border-bottom: 1px solid #f0f0f0;
      position: sticky;
      top: 0;
      background: white;
      z-index: 10;
    }

    .modal-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-footer {
      padding: 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 12px;
      position: sticky;
      bottom: 0;
      background: white;
    }

    .modal-footer button {
      flex: 1;
    }

    .product-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      border: 2px solid transparent;
      animation: slideInUp 0.5s ease-out;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 35px rgba(230, 57, 70, 0.2);
      border-color: #E63946;
    }

    .product-image {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      overflow: hidden;
      object-fit: cover;
    }

    .product-info {
      padding: 16px;
    }

    .product-name {
      font-weight: 700;
      font-size: 15px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: #E63946;
      margin-bottom: 12px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .form-label.required::after {
      content: ' *';
      color: #E63946;
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e5e5;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.3s;
    }

    .form-control:focus {
      outline: none;
      border-color: #E63946;
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
    }

    .cart-item {
      display: flex;
      gap: 12px;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 12px;
      margin-bottom: 12px;
      animation: slideInUp 0.3s ease;
    }

    .cart-item-image {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      object-fit: cover;
    }

    .cart-item-details {
      flex: 1;
    }

    .cart-item-name {
      font-weight: 700;
      font-size: 14px;
      color: #1a1a1a;
    }

    .cart-item-options {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
      line-height: 1.4;
    }

    .cart-item-price {
      font-size: 16px;
      font-weight: 700;
      color: #E63946;
      margin-top: 8px;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border: 1px solid #e5e5e5;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-weight: 600;
    }

    .qty-btn:hover {
      background: #E63946;
      color: white;
      border-color: #E63946;
    }

    .categories-accordion {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .accordion-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      animation: slideInUp 0.5s ease-out;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      background: white;
      border: none;
      width: 100%;
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      transition: all 0.3s ease;
      user-select: none;
    }

    .accordion-header:hover {
      background: #f9f9f9;
    }

    .accordion-header.active {
      background: #f0f0f0;
    }

    .accordion-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
      color: #E63946;
    }

    .accordion-header.active .accordion-icon {
      transform: rotate(90deg);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: #fafafa;
    }

    .accordion-content.active {
      max-height: 2000px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      padding: 20px;
      animation: slideInUp 0.5s ease-out;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 20px;
      background: #1a1a1a;
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      animation: slideInUp 0.3s ease;
      z-index: 2000;
    }

    .toast.success {
      background: #10b981;
    }

    .toast.error {
      background: #E63946;
    }

    .cart-button {
      width: 64px;
      height: 64px;
      background: white;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      cursor: pointer;
      position: relative;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 2px solid transparent;
    }

    .cart-button:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 35px rgba(230, 57, 70, 0.3);
      border-color: #E63946;
    }

    .cart-count {
      position: absolute;
      top: -12px;
      right: -12px;
      background: #E63946;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }

    .checkbox-group:hover {
      background: #f0f0f0;
    }

    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #E63946;
    }

    .badge {
      display: inline-block;
      background: #E63946;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: #E63946;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #d41f3d;
    }

    .topographic-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .topographic-background svg {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Patrón de fondo sutil */
    .topographic-background::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0f0f0f;
      background-image: url(https://res.cloudinary.com/dngpdbq6u/image/upload/v1775768204/image-removebg-preview_al0lb4.png);
      background-repeat: repeat;
      background-attachment: fixed;
      opacity: 0.08;
      z-index: 1;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      }

      .modal-content {
        width: 95vw;
        max-height: 95%;
      }
    }
  </style>
  <style>
    body {
      box-sizing: border-box;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
</head>

<body><!-- Fondo topográfico decorativo -->
  <div class="topographic-background">
    <!-- SVG con patrón de líneas topográficas orgánicas -->
    <svg viewbox="0 0 1200 800" preserveaspectratio="xMidYMid slice"
      xmlns="https://res.cloudinary.com/dngpdbq6u/image/upload/v1775768204/image-removebg-preview_al0lb4.png">
      <defs>
        <!-- Definición de gradiente sutil para las líneas -->
        <lineargradient id="topoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
          <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.04" />
          <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02" />
        </lineargradient>
      </defs> <!-- Capas de curvas orgánicas tipo topografía --> <!-- Capa 1: Líneas suaves y amplias -->
      <path d="M -100 100 Q 150 80 400 120 T 800 110 T 1300 140" stroke="url(#topoGradient)" stroke-width="1.5"
        fill="none" opacity="0.6" />
      <path d="M -50 200 Q 200 180 450 210 T 850 200 T 1250 240" stroke="url(#topoGradient)" stroke-width="1"
        fill="none" opacity="0.5" />
      <path d="M 0 300 Q 250 280 500 320 T 900 310 T 1300 350" stroke="url(#topoGradient)" stroke-width="1.2"
        fill="none" opacity="0.55" />
      <path d="M -80 400 Q 180 380 420 420 T 820 410 T 1280 450" stroke="url(#topoGradient)" stroke-width="1.1"
        fill="none" opacity="0.5" /> <!-- Capa 2: Líneas medianas más irregulares -->
      <path d="M 0 50 Q 180 100 350 70 T 750 110 T 1200 80" stroke="url(#topoGradient)" stroke-width="0.8" fill="none"
        opacity="0.4" />
      <path d="M -100 150 Q 150 160 380 140 T 800 170 T 1300 150" stroke="url(#topoGradient)" stroke-width="0.9"
        fill="none" opacity="0.45" />
      <path d="M 50 250 Q 280 240 520 280 T 950 260 T 1350 300" stroke="url(#topoGradient)" stroke-width="0.85"
        fill="none" opacity="0.42" />
      <path d="M -70 350 Q 160 360 410 340 T 880 380 T 1300 360" stroke="url(#topoGradient)" stroke-width="0.9"
        fill="none" opacity="0.48" /> <!-- Capa 3: Líneas finas para detalle -->
      <path d="M -100 500 Q 120 520 380 500 T 850 530 T 1300 510" stroke="url(#topoGradient)" stroke-width="0.6"
        fill="none" opacity="0.35" />
      <path d="M 20 600 Q 220 620 480 610 T 950 640 T 1350 620" stroke="url(#topoGradient)" stroke-width="0.7"
        fill="none" opacity="0.4" />
      <path d="M -80 700 Q 140 710 390 700 T 820 730 T 1280 710" stroke="url(#topoGradient)" stroke-width="0.65"
        fill="none" opacity="0.38" /> <!-- Capa 4: Ondas verticales suaves -->
      <path d="M 100 -50 Q 120 100 110 250 T 130 550 T 120 850" stroke="url(#topoGradient)" stroke-width="1" fill="none"
        opacity="0.35" />
      <path d="M 300 -50 Q 310 120 300 300 T 320 600 T 310 900" stroke="url(#topoGradient)" stroke-width="0.85"
        fill="none" opacity="0.38" />
      <path d="M 600 -50 Q 620 150 610 350 T 630 650 T 620 900" stroke="url(#topoGradient)" stroke-width="0.9"
        fill="none" opacity="0.36" />
      <path d="M 900 -50 Q 920 100 910 280 T 930 580 T 920 850" stroke="url(#topoGradient)" stroke-width="0.8"
        fill="none" opacity="0.37" />
      <path d="M 1100 -50 Q 1120 140 1110 340 T 1130 640 T 1120 900" stroke="url(#topoGradient)" stroke-width="0.75"
        fill="none" opacity="0.39" /> <!-- Capa 5: Curvas diagonales complejas -->
      <path d="M -100 400 Q 200 350 500 420 T 1000 380 T 1400 450" stroke="url(#topoGradient)" stroke-width="0.75"
        fill="none" opacity="0.32" />
      <path d="M 0 200 Q 250 150 550 250 T 1050 200 T 1500 280" stroke="url(#topoGradient)" stroke-width="0.8"
        fill="none" opacity="0.34" />
      <path d="M -100 650 Q 180 620 420 680 T 900 650 T 1350 700" stroke="url(#topoGradient)" stroke-width="0.7"
        fill="none" opacity="0.33" /> <!-- Capa 6: Líneas muy finas para textura -->
      <path d="M 50 80 Q 200 90 450 75 T 950 100 T 1350 85" stroke="url(#topoGradient)" stroke-width="0.5" fill="none"
        opacity="0.25" />
      <path d="M -50 450 Q 150 460 420 440 T 880 470 T 1300 450" stroke="url(#topoGradient)" stroke-width="0.5"
        fill="none" opacity="0.28" />
      <path d="M 30 760 Q 260 770 530 750 T 1000 780 T 1400 765" stroke="url(#topoGradient)" stroke-width="0.55"
        fill="none" opacity="0.26" />
    </svg>
  </div>
  <div id="app"><!-- ========================================
        PANTALLA DE INICIO - SELECCIÓN DE UBICACIÓN
        ======================================== -->
    <div id="home-view" class="h-full flex flex-col items-center justify-center px-6 py-12 animate-fade-in">
      <!-- Logo de la aplicación --> <img
        src="https://res.cloudinary.com/dngpdbq6u/image/upload/v1775756289/JEAN_xewopn.png" alt="Jean Food"
        style="width: 280px; height: auto; margin-bottom: 48px;" class="animate-slide-up stagger-1">
      <!-- Texto explicativo -->
      <p style="color: #888; font-size: 16px; letter-spacing: 0.05em; margin-bottom: 48px; text-transform: uppercase;"
        class="animate-slide-up stagger-2">¿Dónde quieres pedir?</p><!-- Botones de ubicación -->
      <div style="display: flex; gap: 16px; width: 100%; max-width: 500px; flex-direction: column; align-items: center;"
        class="animate-slide-up stagger-3"><!-- Botón San Fernando - Activo con icono de ubicación --> <button
          onclick="showLocation('san-fernando')" class="btn-primary"
          style="width: 100%; padding: 16px 32px; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 12px;">
          <i data-lucide="map-pin" style="width: 20px; height: 20px;"></i> San Fernando </button>
        <!-- Botón Rancagua - Deshabilitado (próximamente) --> <button onclick="showLocation('rancagua')"
          class="btn-secondary"
          style="width: 100%; padding: 16px 32px; font-size: 16px; opacity: 0.5; cursor: not-allowed;" disabled> <i
            data-lucide="map-pin" style="width: 20px; height: 20px;"></i> Rancagua (Próximamente) </button>
      </div>
    </div><!-- ========================================
        PANTALLA PRINCIPAL - CATÁLOGO DE PRODUCTOS
        ======================================== -->
    <div id="sf-view" style="display: none; height: 100%; flex-direction: column; padding: 24px; overflow-y: auto;"
      class="animate-fade-in"><!-- Encabezado con logo e instrucciones -->
      <div style="text-align: center; margin-bottom: 32px; display: flex; flex-direction: column; align-items: center;">
        <img src="https://res.cloudinary.com/dngpdbq6u/image/upload/v1775756289/JEAN_xewopn.png" alt="Jean Food"
          style="height: 150px; margin-bottom: 20px;">
        <p style="color: #999; font-size: 14px;">Selecciona una categoría y elige tus productos favoritos</p>
      </div><!-- Contenedor de categorías (acordeón) -->
      <div id="categories-container" style="max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 12px;"
        class="categories-accordion"><!-- Las categorías se cargan dinámicamente con JavaScript -->
      </div><!-- Botón de carrito flotante -->
      <div id="cart-header" style="position: fixed; bottom: 30px; right: 30px; display: none;"><button
          onclick="toggleCart()" class="cart-button"> <i data-lucide="shopping-basket"
            style="width: 28px; height: 28px; color: #E63946;"></i> <span class="cart-count" id="cart-count">0</span>
        </button>
      </div>
    </div>
  </div><!-- ========================================
       MODAL - DETALLES DEL PRODUCTO
       ======================================== -->
  <div id="product-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-product-name">Producto</h2><button onclick="closeProductModal()"
          style="background: none; border: none; cursor: pointer; font-size: 24px; color: #999;"> <i data-lucide="x"
            style="width: 24px; height: 24px;"></i> </button>
      </div>
      <div class="modal-body">
        <div id="modal-content"><!-- Contenido del producto cargado dinámicamente -->
        </div>
      </div>
      <div class="modal-footer"><button onclick="closeProductModal()" class="btn-secondary">Cancelar</button> <button
          onclick="addToCart()" class="btn-primary">Agregar al Carrito</button>
      </div>
    </div>
  </div><!-- ========================================
       MODAL - CARRITO DE COMPRAS
       ======================================== -->
  <div id="cart-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Tu Carrito</h2><button onclick="toggleCart()"
          style="background: none; border: none; cursor: pointer; font-size: 24px; color: #999;"> <i data-lucide="x"
            style="width: 24px; height: 24px;"></i> </button>
      </div>
      <div class="modal-body">
        <div id="cart-items-list"><!-- Ítems del carrito cargados dinámicamente -->
        </div>

    /**
     * Muestra la pantalla del catálogo de la ubicación seleccionada
     * @param {string} location - Ubicación: 'san-fernando' o 'rancagua'
     */
    function showLocation(location) {
      state.currentLocation = location;
      document.getElementById('home-view').style.display = 'none';
      document.getElementById('sf-view').style.display = 'flex';
      renderCategories();
      setTimeout(() => lucide.createIcons(), 100);
    }

    /**
     * Regresa a la pantalla de selección de ubicación
     */
    function goHome() {
      state.currentLocation = null;
      state.cart = [];
      document.getElementById('sf-view').style.display = 'none';
      document.getElementById('home-view').style.display = 'flex';
      closeAllModals();
    }

    /**
     * Renderiza todas las categorías en acordeón expandible
     */
    function renderCategories() {
      const container = document.getElementById('categories-container');
      container.innerHTML = '';

      // Itera sobre cada categoría de productos
      Object.keys(state.products).forEach((category, index) => {
        // Crea el item del acordeón
        const item = document.createElement('div');
        item.className = 'accordion-item';

        // Crea el encabezado del acordeón
        const header = document.createElement('button');
        header.className = 'accordion-header';
        header.innerHTML = `
          <span>${category}</span>
          <div class="accordion-icon">
            <i data-lucide="chevron-right"></i>
          </div>
        `;

        // Crea el contenedor de contenido del acordeón
        const content = document.createElement('div');
        content.className = 'accordion-content';

        // Crea la grilla de productos
        const grid = document.createElement('div');
        grid.className = 'products-grid';

        // Agrega cada producto a la grilla
        state.products[category].forEach(product => {
          const card = createProductCard(product);
          grid.appendChild(card);
        });

        content.appendChild(grid);
        item.appendChild(header);
        item.appendChild(content);
        container.appendChild(item);

        // Event listener para expandir/contraer acordeón
        header.addEventListener('click', () => {
          const isActive = header.classList.contains('active');

          // Cierra todos los acordeones abiertos
          document.querySelectorAll('.accordion-header').forEach(h => {
            h.classList.remove('active');
          });
          document.querySelectorAll('.accordion-content').forEach(c => {
            c.classList.remove('active');
          });

          // Abre el acordeón actual si no estaba abierto
          if (!isActive) {
            header.classList.add('active');
            content.classList.add('active');
          }
        });
      });

      lucide.createIcons();
    }

    /**
     * Crea una tarjeta de producto con imagen o emoji
     * @param {object} product - Objeto del producto
     * @returns {HTMLElement} Elemento de la tarjeta
     */
    function createProductCard(product) {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.onclick = () => openProductModal(product);

      // Determina si mostrar imagen o emoji
      const imageDisplay = product.image
        ? `<img src="${product.image}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover;" loading="lazy">`
        : `<span>${product.emoji}</span>`;

      card.innerHTML = `
        <div class="product-image">
          ${imageDisplay}
        </div>
        <div class="product-info">
          <div class="product-name">${product.name}</div>
          ${product.description ? `<div style="font-size: 12px; color: #999; margin-bottom: 8px; line-height: 1.3;">${product.description}</div>` : ''}
          <div class="product-price">$${product.price.toLocaleString('es-CL')}</div>
          <button class="btn-primary" style="width: 100%; padding: 8px;">Agregar</button>
        </div>
      `;
      return card;
    }

    /**

     * @param {object} product - Objeto del producto
     */
    function openProductModal(product) {
      state.currentProduct = {
        ...product,
        selectedOptions: {},
        quantity: 1,
        extras: []
      };

      const content = document.getElementById('modal-content');
      content.innerHTML = generateProductForm(product);
      document.getElementById('product-modal').classList.add('active');
      lucide.createIcons();
    }

    /**
     * Genera el formulario dinámico según el tipo de producto
     * @param {object} product - Objeto del producto
     * @returns {string} HTML del formulario
     */
    function generateProductForm(product) {
      // Obtiene imagen del producto o usa emoji
      const imageDisplay = product.image
        ? `<img src="${product.image}" alt="${product.name}" style="width: 50%; max-height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 16px;">`
        : `<div style="font-size: 80px; text-align: center; margin-bottom: 16px;">${product.emoji}</div>`;

      let form = `
        <div style="margin-bottom: 24px;">
          ${imageDisplay}
          <h3 style="font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px;">${product.name}</h3>
          ${product.description ? `<p style="color: #666; font-size: 14px; margin-bottom: 12px; line-height: 1.5;">${product.description}</p>` : ''}
          <p style="color: #999; margin-bottom: 16px;">Selecciona tus opciones preferidas</p>
          <p style="font-size: 18px; font-weight: 700; color: #E63946;">$${product.price.toLocaleString('es-CL')}</p>

    /**
     * Maneja el cambio de proteína y suma costos adicionales
     * @param {string} value - Valor de la proteína con costo (formato: "NOMBRE|COSTO")
     */
    function handleProteinChange(value) {
      const [protein, costStr] = value.split('|');
      const cost = parseInt(costStr) || 0;

      // Restar costo anterior si existe
      if (state.currentProduct.lastProteinCost) {
        state.currentProduct.additionalCost = (state.currentProduct.additionalCost || 0) - state.currentProduct.lastProteinCost;
      }

      // Sumar nuevo costo
      if (cost > 0) {
        state.currentProduct.additionalCost = (state.currentProduct.additionalCost || 0) + cost;
      }

      // Guardar proteína y costo
      state.currentProduct.selectedOptions.protein = protein;
      state.currentProduct.lastProteinCost = cost;
    }

    /**
     * Alterna opciones adicionales del producto
     * @param {string} id - ID del elemento checkbox
     * @param {string} label - Etiqueta de la opción
     * @param {number} cost - Costo adicional de la opción
     */
    function toggleOption(id, label, cost = 0) {
      const checkbox = document.getElementById(id);
      const optionWithCost = cost > 0 ? `${label} (+$${cost})` : label;

      if (checkbox.checked) {
        if (!state.currentProduct.extras.includes(optionWithCost)) {
          state.currentProduct.extras.push(optionWithCost);
          if (cost > 0) {
            state.currentProduct.additionalCost = (state.currentProduct.additionalCost || 0) + cost;
          }
        }
      } else {
        state.currentProduct.extras = state.currentProduct.extras.filter(e => e !== optionWithCost);
        if (cost > 0) {
          state.currentProduct.additionalCost = (state.currentProduct.additionalCost || 0) - cost;
        }
      }
    }

    /**
     * Alterna un acordeón dentro del modal
     * @param {Event} event - Evento del click
     */
    function toggleAccordion(event) {
      const header = event.currentTarget;
      const content = header.nextElementSibling;
      const isActive = header.classList.contains('active');

      if (isActive) {
        header.classList.remove('active');
        content.classList.remove('active');
      } else {
        header.classList.add('active');
        content.classList.add('active');
      }
    }

    /**
     * Muestra/oculta opciones adicionales
     */
    function toggleAddMore() {
      const checkbox = document.getElementById('add-more');
      const extraOptions = document.getElementById('extra-options');
      extraOptions.style.display = checkbox.checked ? 'block' : 'none';
    }

    /**
     * Agrega el producto actual al carrito
     */
    function addToCart() {
      // Validación: si es ARMA TU ROLL, debe seleccionar proteína
      if (!state.currentProduct.selectedOptions.protein && state.currentProduct.category === 'ARMA TU ROLL') {
        showToast('Por favor selecciona una proteína', 'error');
        return;
      }

      // Validación: si es POSTRES, debe seleccionar sabor
      if (!state.currentProduct.selectedOptions.postreFlavor && state.currentProduct.category === 'POSTRES') {
        showToast('Por favor selecciona un sabor', 'error');
        return;
      }

      // Crea un item del carrito con ID único basado en timestamp
      const cartItem = {
        id: Date.now(),
        ...state.currentProduct
      };

      // Agrega al carrito y muestra confirmación
      state.cart.push(cartItem);
      showToast(`${state.currentProduct.name} agregado al carrito`, 'success');
      closeProductModal();
      updateCartUI();
    }

    /**
     * Actualiza la interfaz del carrito con los items actuales
     */
    function updateCartUI() {
      // Calcula cantidad total de items
      const count = state.cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cart-count').textContent = count;
      document.getElementById('cart-header').style.display = count > 0 ? 'block' : 'none';

      const itemsList = document.getElementById('cart-items-list');
      const emptyMsg = document.getElementById('empty-cart-message');
      const summary = document.getElementById('cart-summary');

      if (state.cart.length === 0) {
        // Si el carrito está vacío, muestra mensaje
        itemsList.innerHTML = '';
        emptyMsg.style.display = 'block';
        summary.style.display = 'none';
      } else {
        // Si hay items, muestra la lista
        emptyMsg.style.display = 'none';
        summary.style.display = 'block';
        itemsList.innerHTML = state.cart.map(item => {
          // Determina si mostrar imagen o emoji
          const imageDisplay = item.image
            ? `<img src="${item.image}" alt="${item.name}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">`
            : `<span>${item.emoji}</span>`;

          return `
            <div class="cart-item">
              <div class="cart-item-image">
                ${imageDisplay}
              </div>
              <div class="cart-item-details">
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-options">
                  ${item.extras.length > 0 ? `<p>${item.extras.join(', ')}</p>` : ''}
                </div>
                <div class="cart-item-price">$${((item.price + (item.additionalCost || 0)) * item.quantity).toLocaleString('es-CL')}</div>
                <div class="qty-controls">
                  <button class="qty-btn" onclick="removeFromCart(${item.id})">
                    <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                  </button>
                  <span style="font-size: 14px; color: #666;">Cantidad: ${item.quantity}</span>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // Calcula y muestra el total
        const total = state.cart.reduce((sum, item) => sum + ((item.price + (item.additionalCost || 0)) * item.quantity), 0);
        document.getElementById('subtotal').textContent = `$${total.toLocaleString('es-CL')}`;
        document.getElementById('total').textContent = `$${total.toLocaleString('es-CL')}`;
      }

      lucide.createIcons();
    }

    /**
     * Elimina un item del carrito
     * @param {number} id - ID único del item
     */
    function removeFromCart(id) {
      state.cart = state.cart.filter(item => item.id !== id);
      updateCartUI();
    }

      closeDeliveryForm();

    async function sendOrderToBackend(order) {
      try {
        const response = await fetch('http://localhost:3000/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(order)
        });
        return await response.json();
      } catch (error) {
        console.error('Error enviando pedido al backend:', error);
        return { success: false, message: 'No se pudo conectar con el servidor' };
      }
    }

    function buildOrderPayload() {
      return {
        cart: state.cart.map(item => ({
          name: item.name,
          price: item.price + (item.additionalCost || 0),
          quantity: item.quantity,
          selectedOptions: item.selectedOptions || {},
          extras: item.extras || []
        })),
        customer: {
          name: state.customerName || 'Cliente',
          email: state.customerEmail || 'cliente@correo.com',
          phone: state.customerPhone,
          address: state.customerAddress,
          notes: state.customerNotes
        },
        paymentMethod: state.selectedPaymentMethod,
        total: state.cart.reduce((sum, item) => sum + ((item.price + (item.additionalCost || 0)) * item.quantity), 0),
        deliveryType: state.deliveryType
      };
    }

    async function handleCheckoutResponse(result) {
      if (!result.success) {
        showToast(result.message || 'Error al procesar el pedido', 'error');
        return;
      }

      if (result.paymentUrl) {
        showToast('Redirigiendo al pago...', 'success');
        window.location.href = result.paymentUrl;
        return;
      }

      if (result.next === 'offline') {
        showToast(result.message || 'Pedido registrado correctamente', 'success');
        state.cart = [];
        updateCartUI();
        setTimeout(() => goHome(), 1500);
      }
    }

    /**

     * @param {string} message - Mensaje a mostrar
     * @param {string} type - Tipo: 'success', 'error'
     */
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
